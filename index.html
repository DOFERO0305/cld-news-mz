<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLD News Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent-1: #3b82f6; /* Azul Política */
            --accent-2: #10b981; /* Verde Economia */
            --accent-3: #f59e0b; /* Laranja Internacional */
            --text: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 40px;
        }

        /* O segredo do Dashboard: Grid de 3 colunas */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            align-items: start;
        }

        .column {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 16px;
            padding: 20px;
            border-top: 5px solid var(--accent-1);
        }

        /* Cores diferentes para cada coluna */
        .col-politica { border-top-color: var(--accent-1); }
        .col-economia { border-top-color: var(--accent-2); }
        .col-geral { border-top-color: var(--accent-3); }

        .column-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .news-item {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .news-item:hover {
            transform: scale(1.02);
            background: #2d3748;
        }
    </style>
</head>
<body>

    <header>
        <h1>CLD <span>NEWS</span> DASHBOARD</h1>
        <p>A tua central de inteligência e notícias 🇲🇿</p>
    </header>

    <div class="dashboard">
        <div class="column col-politica" id="col-politica">
            <div class="column-title">⚖️ Política</div>
            <div class="news-list" id="list-politica">Carregando...</div>
        </div>

        <div class="column col-economia" id="col-economia">
            <div class="column-title">💰 Economia</div>
            <div class="news-list" id="list-economia">Carregando...</div>
        </div>

        <div class="column col-geral" id="col-geral">
            <div class="column-title">🌍 Internacional</div>
            <div class="news-list" id="list-geral">Carregando...</div>
        </div>
    </div>

</body>
</html>
