<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ News | Ao Minuto</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e11d48; /* Vermelho Notícia */
            --politica: #2563eb;
            --economia: #059669;
            --sociedade: #7c3aed;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            margin: 0;
        }

        header {
            background: #fff;
            padding: 20px;
            border-bottom: 3px solid var(--primary);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .main-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .category-column {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .category-header {
            padding: 15px;
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* Estilos específicos das categorias */
        .cat-politica .category-header { background: var(--politica); }
        .cat-economia .category-header { background: var(--economia); }
        .cat-sociedade .category-header { background: var(--sociedade); }

        .news-list { padding: 10px; }

        .news-card {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            transition: 0.2s;
            cursor: pointer;
        }

        .news-card:hover { background: #f1f5f9; }

        .news-card h3 {
            margin: 0 0 8px 0;
            font-size: 1rem;
            line-height: 1.4;
        }

        .news-meta {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 600;
        }
    </style>
</head>
<body>

<header>
    <h1>MZ <span>MINUTO</span></h1>
</header>

<main class="main-dashboard">
    <section class="category-column cat-politica">
        <div class="category-header">Política</div>
        <div id="feed-politica" class="news-list">A carregar...</div>
    </section>

    <section class="category-column cat-economia">
        <div class="category-header">Economia</div>
        <div id="feed-economia" class="news-list">A carregar...</div>
    </section>

    <section class="category-column cat-sociedade">
        <div class="category-header">Sociedade & País</div>
        <div id="feed-sociedade" class="news-list">A carregar...</div>
    </section>
</main>

</body>
</html>
