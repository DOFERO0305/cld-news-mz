<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLD News | Portal Profissional</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #e11d48; --politica: #2563eb; --economia: #059669;
            --sociedade: #7c3aed; --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

        /* Estilo Header Premium */
        header {
            background: var(--card); padding: 20px 5%; border-bottom: 4px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -1.5px; }
        .logo span { color: var(--primary); }

        /* Dashboard em Colunas */
        .dashboard {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px; padding: 30px; max-width: 1600px; margin: 0 auto;
        }

        .column { background: rgba(30, 41, 59, 0.5); border-radius: 24px; overflow: hidden; border: 1px solid #334155; }
        .col-header { padding: 18px; color: #fff; font-weight: 800; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        
        .c-pol { background: var(--politica); }
        .c-eco { background: var(--economia); }
        .c-soc { background: var(--sociedade); }

        /* Cartão de Notícia Estilo Phoenix */
        .news-card { background: var(--card); margin: 15px; border-radius: 16px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #334155; }
        .news-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 12px 20px rgba(0,0,0,0.4); }
        
        .thumb-box { width: 100%; height: 200px; background: #334155; position: relative; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .source-tag { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }

        .card-info { padding: 15px; }
        .card-info h3 { margin: 0 0 10px 0; font-size: 1.1rem; line-height: 1.4; color: #fff; }
        
        .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid #334155; font-size: 0.75rem; color: #94a3b8; }
        .btns i { margin-left: 15px; cursor: pointer; font-size: 1rem; }
        .btns i:hover { color: var(--primary); }

        /* Leitor Interno (Modal) */
        #reader { display: none; position: fixed; inset: 0; z-index: 9999; background: #000; }
        .reader-nav { background: #fff; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; color: #000; }
        .reader-nav button { background: var(--primary); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        iframe { width: 100%; height: calc(100% - 60px); border: none; background: #fff; }
    </style>
</head>
<body>

<header>
    <div class="logo">CLD<span>NEWS</span></div>
    <div style="font-size: 0.8rem; font-weight: bold; color: #22c55e;"><i class="fas fa-signal"></i> AO VIVO</div>
</header>

<main class="dashboard">
    <section class="column"><div class="col-header c-pol"><i class="fas fa-gavel"></i> Política</div><div id="feed-politica"></div></section>
    <section class="column"><div class="col-header c-eco"><i class="fas fa-chart-line"></i> Economia</div><div id="feed-economia"></div></section>
    <section class="column"><div class="col-header c-soc"><i class="fas fa-users"></i> Sociedade</div><div id="feed-sociedade"></div></section>
</main>

<div id="reader">
    <div class="reader-nav">
        <span onclick="closeReader()" style="cursor:pointer; font-size: 2rem;">&times;</span>
        <div id="nav-title" style="font-weight: bold; font-size: 0.9rem; max-width: 60%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">A ler...</div>
        <button onclick="closeReader()">FECHAR</button>
    </div>
    <iframe id="frame"></iframe>
</div>

<script>
    const CONFIG = {
        politica: ['https://cartamz.com/feed/', 'https://evidencias.co.mz/feed/'],
        economia: ['https://mznews.co.mz/feed/', 'https://dossiersefactos.co.mz/feed/'],
        sociedade: ['https://opais.co.mz/feed/', 'https://integritymag.co.mz/feed/']
    };

    // Esta função "caça" a imagem se o feed não a enviar pronta
    function findImage(item) {
        if (item.thumbnail) return item.thumbnail;
        const temp = document.createElement('div');
        temp.innerHTML = item.description || item.content;
        const img = temp.querySelector('img');
        return img ? img.src : 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=600&auto=format&fit=crop';
    }

    async function fetchNews() {
        for (const cat in CONFIG) {
            const container = document.getElementById(`feed-${cat}`);
            let html = '';
            
            for (const url of CONFIG[cat]) {
                try {
                    // API de ponte para evitar erros de carregamento
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
                    const data = await res.json();
                    
                    data.items.slice(0, 5).forEach(item => {
                        const img = findImage(item);
                        html += `
                            <article class="news-card" onclick="openReader('${item.link}', '${item.title}')">
                                <div class="thumb-box">
                                    <img src="${img}" loading="lazy">
                                    <div class="source-tag">${data.feed.title}</div>
                                </div>
                                <div class="card-info">
                                    <h3>${item.title}</h3>
                                    <div class="card-footer">
                                        <span>${new Date(item.pubDate).toLocaleDateString()}</span>
                                        <div class="btns">
                                            <i class="fas fa-share-alt" onclick="event.stopPropagation(); alert('Link copiado!')"></i>
                                            <i class="far fa-bookmark"></i>
                                        </div>
                                    </div>
                                </div>
                            </article>`;
                    });
                } catch (e) { console.error("Falha ao carregar fonte:", url); }
            }
            container.innerHTML = html;
        }
    }

    function openReader(url, title) {
        document.getElementById('frame').src = url;
        document.getElementById('nav-title').innerText = title;
        document.getElementById('reader').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeReader() {
        document.getElementById('reader').style.display = 'none';
        document.getElementById('frame').src = '';
        document.body.style.overflow = 'auto';
    }

    fetchNews();
    setInterval(fetchNews, 600000); // Atualiza a cada 10 minutos
</script>
</body>
</html>
