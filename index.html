<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ Minuto | Portal de Notícias</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e11d48; --politica: #2563eb; --economia: #059669;
            --sociedade: #7c3aed; --bg: #f8fafc; --text: #1e293b;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; }

        header {
            background: #fff; padding: 20px; border-bottom: 3px solid var(--primary);
            text-align: center; position: sticky; top: 0; z-index: 1000;
        }

        .main-dashboard {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto;
        }

        .category-column { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .category-header { padding: 15px; color: white; font-weight: 800; text-transform: uppercase; font-size: 0.9rem; }
        
        .cat-politica .category-header { background: var(--politica); }
        .cat-economia .category-header { background: var(--economia); }
        .cat-sociedade .category-header { background: var(--sociedade); }

        .news-card {
            padding: 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s;
        }
        .news-card:hover { background: #f1f5f9; border-left: 4px solid var(--primary); }
        .news-card h3 { margin: 0 0 8px 0; font-size: 1rem; line-height: 1.4; }
        .news-meta { font-size: 0.75rem; color: #64748b; font-weight: 600; }

        /* MODAL DE LEITURA 🖼️ */
        .modal {
            display: none; position: fixed; z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
        }
        .modal-content {
            background: #fff; margin: 2% auto; width: 90%; height: 90%;
            border-radius: 12px; position: relative; overflow: hidden;
        }
        .close-btn {
            position: absolute; right: 20px; top: 10px; font-size: 35px;
            color: var(--primary); cursor: pointer; z-index: 3000;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<header><h1>MZ <span>MINUTO</span></h1></header>

<main class="main-dashboard">
    <section class="category-column cat-politica">
        <div class="category-header">⚖️ Política</div>
        <div id="feed-politica" class="news-list">A carregar...</div>
    </section>
    <section class="category-column cat-economia">
        <div class="category-header">💰 Economia</div>
        <div id="feed-economia" class="news-list">A carregar...</div>
    </section>
    <section class="category-column cat-sociedade">
        <div class="category-header">🌍 Sociedade & País</div>
        <div id="feed-sociedade" class="news-list">A carregar...</div>
    </section>
</main>

<div id="modal-leitura" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="fecharModal()">&times;</span>
        <iframe id="iframe-noticia" src=""></iframe>
    </div>
</div>

<script>
    const fontes = {
        politica: ['https://cartamz.com/feed/', 'https://evidencias.co.mz/feed/'],
        economia: ['https://mznews.co.mz/feed/', 'https://dossiersefactos.co.mz/feed/'],
        sociedade: ['https://opais.co.mz/feed/', 'https://integritymag.co.mz/feed/']
    };

    async function atualizarPortal() {
        for (let cat in fontes) {
            const container = document.getElementById(`feed-${cat}`);
            let html = '';
            for (let url of fontes[cat]) {
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
                    const data = await res.json();
                    data.items.slice(0, 4).forEach(item => {
                        html += `
                            <div class="news-card" onclick="abrirNoticia('${item.link}')">
                                <div class="news-meta">${data.feed.title}</div>
                                <h3>${item.title}</h3>
                            </div>`;
                    });
                } catch (e) { console.error("Erro no feed"); }
            }
            container.innerHTML = html;
        }
    }

    function abrirNoticia(url) {
        document.getElementById('iframe-noticia').src = url;
        document.getElementById('modal-leitura').style.display = 'block';
    }

    function fecharModal() {
        document.getElementById('modal-leitura').style.display = 'none';
        document.getElementById('iframe-noticia').src = '';
    }

    atualizarPortal();
    setInterval(atualizarPortal, 300000); // Atualiza a cada 5 min
</script>
</body>
</html>
