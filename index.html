<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ News Pro | Central de Notícias</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #dc2626; --politica: #1d4ed8; --economia: #047857;
            --sociedade: #6d28d9; --bg: #f1f5f9; --text: #0f172a;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }

        header {
            background: #fff; padding: 1.5rem; border-bottom: 4px solid var(--primary);
            text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 { margin: 0; font-weight: 900; letter-spacing: -2px; font-size: 2.2rem; }
        header span { color: var(--primary); }

        .dashboard {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px; padding: 30px; max-width: 1600px; margin: 0 auto;
        }

        .column { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .column-header { padding: 18px; color: #fff; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        .cat-politica .column-header { background: var(--politica); }
        .cat-economia .column-header { background: var(--economia); }
        .cat-sociedade .column-header { background: var(--sociedade); }

        /* Estilo dos Cartões com Imagem */
        .card {
            border-bottom: 1px solid #e2e8f0; transition: 0.3s; padding: 0; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .card:hover { background: #f8fafc; transform: scale(1.01); }
        
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #ddd; }
        
        .card-body { padding: 15px; }
        .card-body h3 { margin: 10px 0; font-size: 1.1rem; line-height: 1.3; font-weight: 700; cursor: pointer; }
        .card-body h3:hover { color: var(--primary); }

        .card-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; border-top: 1px solid #f1f5f9; font-size: 0.8rem; color: #64748b;
        }

        .social-btns i { margin-left: 12px; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .social-btns i:hover { color: var(--primary); }

        /* Modal */
        .modal {
            display: none; position: fixed; z-index: 3000; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
        }
        .modal-content {
            background: #fff; margin: 1% auto; width: 95%; height: 95%;
            border-radius: 15px; position: relative;
        }
        .close { position: absolute; right: 20px; top: 10px; font-size: 40px; color: var(--primary); cursor: pointer; z-index: 4000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<header><h1>MZ<span>MINUTO</span> PRO</h1></header>

<main class="dashboard">
    <section class="column cat-politica">
        <div class="column-header"><i class="fas fa-gavel"></i> Política</div>
        <div id="feed-politica"></div>
    </section>
    <section class="column cat-economia">
        <div class="column-header"><i class="fas fa-chart-line"></i> Economia</div>
        <div id="feed-economia"></div>
    </section>
    <section class="column cat-sociedade">
        <div class="column-header"><i class="fas fa-users"></i> Sociedade</div>
        <div id="feed-sociedade"></div>
    </section>
</main>

<div id="reader" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeNews()">&times;</span>
        <iframe id="news-frame"></iframe>
    </div>
</div>

<script>
    const config = {
        politica: ['https://cartamz.com/feed/', 'https://evidencias.co.mz/feed/', 'https://jornalrigor.co.mz/feed/'],
        economia: ['https://mznews.co.mz/feed/', 'https://dossiersefactos.co.mz/feed/'],
        sociedade: ['https://opais.co.mz/feed/', 'https://integritymag.co.mz/feed/', 'https://www.folhademaputo.co.mz/feed/']
    };

    async function loadNews() {
        for (let cat in config) {
            const container = document.getElementById(`feed-${cat}`);
            let html = '';
            
            for (let url of config[cat]) {
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
                    const data = await res.json();
                    
                    data.items.slice(0, 3).forEach(item => {
                        const thumb = item.thumbnail || 'https://via.placeholder.com/400x200?text=MZ+News';
                        html += `
                            <article class="card">
                                <img src="${thumb}" class="card-img" alt="imagem" onclick="openNews('${item.link}')">
                                <div class="card-body">
                                    <div class="news-meta" style="font-size: 0.7rem; color: var(--primary); font-weight: bold;">${data.feed.title.toUpperCase()}</div>
                                    <h3 onclick="openNews('${item.link}')">${item.title}</h3>
                                </div>
                                <div class="card-footer">
                                    <span>${new Date(item.pubDate).toLocaleDateString()}</span>
                                    <div class="social-btns">
                                        <i class="fas fa-share-alt" title="Partilhar" onclick="alert('Link copiado!')"></i>
                                        <i class="far fa-comment" title="Comentários"></i>
                                        <i class="far fa-bookmark" title="Guardar"></i>
                                    </div>
                                </div>
                            </article>`;
                    });
                } catch (e) { console.log("Erro na fonte"); }
            }
            container.innerHTML = html;
        }
    }

    function openNews(url) {
        document.getElementById('news-frame').src = url;
        document.getElementById('reader').style.display = 'block';
    }

    function closeNews() {
        document.getElementById('reader').style.display = 'none';
        document.getElementById('news-frame').src = '';
    }

    loadNews();
    setInterval(loadNews, 600000); // Atualiza a cada 10 min
</script>
</body>
</html>
